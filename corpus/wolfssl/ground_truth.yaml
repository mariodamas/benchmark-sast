# =============================================================================
# GROUND TRUTH v2 — wolfSSL (Corpus de Validacion Externa)
# Benchmark SAST: CodeQL vs Coverity vs Union
#
# PROPOSITO:
#   Verificar si las diferencias CodeQL/Coverity observadas en mbedTLS son
#   propiedades de las herramientas o artefactos del codigo especifico.
#   wolfSSL implementa el mismo dominio (TLS/cripto en C) con arquitectura
#   interna distinta: optimizaciones agresivas (loop unrolling, AES-NI),
#   sin abstracciones de seguridad adicionales.
#
#   Si sign(Recall_CodeQL - Recall_Coverity) es igual en ambos corpus:
#     → La conclusion sobre complementariedad es ROBUSTA al corpus.
#   Si invierte signo:
#     → Puede ser artefacto del codigo de mbedTLS, no de las herramientas.
#
# Total instancias:    13
# Evaluables SAST:     11  (structural_fn: false)
# FN estructurales:     2  (structural_fn: true)
#
# DISTRIBUCION POR CWE FAMILY (evaluables):
#   buffer-overflow:    5  → CWE-121/122/125
#   integer-overflow:   2  → CWE-190/191
#   null-deref:         3  → CWE-476
#   use-after-free:     1  → CWE-416
#   side-channel:       2  → CWE-203 (FN estructurales)
#
# CROSS-PROJECT CWE PAIRS (para analisis de consistencia):
#   CWE-122 heap overflow:  wolfSSL CVE-2022-34293 ↔ mbedTLS CVE-2022-46393
#   CWE-121 stack overflow: wolfSSL CVE-2023-3724  ↔ mbedTLS CVE-2021-44732
#   CWE-125 OOB read:       wolfSSL CVE-2021-38597 ↔ mbedTLS CVE-2018-9988
#   CWE-476 null deref:     wolfSSL CVE-2023-6935  ↔ mbedTLS CVE-2021-43666
#   CWE-190 int overflow:   wolfSSL CVE-2022-42771 ↔ mbedTLS CVE-2020-36421
#
# FUENTES:
#   NVD: https://nvd.nist.gov/vuln/search?query=wolfssl
#   Advisories: https://www.wolfssl.com/docs/security-vulnerabilities/
#   GitHub: https://github.com/wolfSSL/wolfssl
# =============================================================================

project: wolfssl
repo_url: https://github.com/wolfSSL/wolfssl.git
language: C
build_system: autoconf
compile_commands_generator: "autoreconf -i && ./configure --enable-all && bear -- make -j4"
corpus_role: validation
sast_quality: excellent
kloc: 45

