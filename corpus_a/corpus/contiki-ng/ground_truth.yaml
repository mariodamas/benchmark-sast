# =============================================================================
# GROUND TRUTH v1 — Contiki-NG (Corpus Contraste)
# Benchmark SAST: CodeQL vs Coverity vs Unión
#
# Total instancias:    2
# Evaluables SAST:     2  (structural_fn: false)
# FN estructurales:    0
#
# DISTRIBUCIÓN POR CWE FAMILY (evaluables):
#   buffer-overflow:   1  → CWE-120 (BLE L2CAP)
#   oob-read:          1  → CWE-125 (SNMP)
#
# NOTA CWE: NVD asigna CWE-125 a CVE-2020-12141 (OOB read en SNMP),
#   no CWE-476 (null-deref RPL). Verificar si hay CVE adicional en RPL.
#
# FUENTES:
#   NVD: https://nvd.nist.gov/vuln/search?query=contiki-ng
#   PR:  https://github.com/contiki-ng/contiki-ng/pull/1662
#   PR:  https://github.com/contiki-ng/contiki-ng/pull/1355
#
# commit_verified: true  → hash comprobado en el repo público
