# =============================================================================
# config/coverity_checkers.conf
# Configuración de checkers de Coverity para el benchmark SAST
#
# PROPÓSITO:
#   Activar exclusivamente los checkers relevantes para las CWE del ground
#   truth del benchmark. Analizar con --all y sin restricciones generaría
#   un volumen de findings que contaminaría las métricas de FP/KLOC y
#   haría imposible la comparación controlada con CodeQL.
#
# FORMATO:
#   Fichero de configuración XML de Coverity Analysis.
#   Se pasa como: cov-analyze --config coverity_checkers.conf
#
# REFERENCIA:
#   Coverity Static Analysis Checker Reference v2023.6
#   https://sig-docs.synopsys.com/polaris/topics/c_coverity-checker-ref.html
# =============================================================================

<?xml version="1.0" encoding="UTF-8"?>
<checker-configuration>

  <!--
    ======================================================================
    CWE-476: NULL Pointer Dereference
    Instancias del GT: CVE-2021-43666 (mbedTLS)
    ======================================================================
  -->
  <checker name="NULL_RETURNS"    enabled="true"
           comment="Función retorna NULL y se desreferencia sin comprobación"/>
  <checker name="FORWARD_NULL"    enabled="true"
           comment="NULL propagado a través de llamadas a funciones"/>
  <checker name="CHECKED_RETURN"  enabled="true"
           comment="Return value de funciones que pueden fallar no se comprueba"/>

  <!--
    ======================================================================
    CWE-190 / CWE-191: Integer Overflow / Underflow
    Instancias del GT: CVE-2020-36421 (mbedTLS — bignum)
    ======================================================================
  -->
  <checker name="INTEGER_OVERFLOW"      enabled="true"
           comment="Desbordamiento aritmético en operaciones sobre enteros"/>
  <checker name="OVERFLOW_BEFORE_WIDEN" enabled="true"
           comment="Overflow antes del cast implícito a tipo más ancho"/>
  <checker name="NEGATIVE_RETURNS"      enabled="true"
           comment="Valor de retorno negativo usado como tamaño de buffer"/>
  <checker name="BAD_SHIFT"             enabled="true"
           comment="Shift de bits fuera de rango — UB en C99"/>

  <!--
    ======================================================================
    CWE-119 / CWE-121 / CWE-122 / CWE-125: Buffer overflows
    Instancias del GT: CVE-2022-46392, CVE-2022-46393 (mbedTLS)
                       CVE-2022-34293, CVE-2023-3724, CVE-2021-38597 (wolfSSL)
    ======================================================================
  -->
  <checker name="BUFFER_SIZE"   enabled="true"
           comment="Acceso a buffer fuera de sus límites (lectura y escritura)"/>
  <checker name="OVERRUN"       enabled="true"
           comment="Out-of-bounds read — OOB read en buffer de longitud conocida"/>
  <checker name="HEAP_OVERFLOW" enabled="true"
           comment="Heap buffer overflow — escritura más allá del bloque asignado"/>
  <checker name="STRING_OVERFLOW" enabled="true"
           comment="Overflow en funciones de string (strcpy, sprintf sin n)"/>
  <checker name="ARRAY_VS_SINGLETON" enabled="true"
           comment="Acceso a elemento escalar como si fuera array"/>

  <!--
    ======================================================================
    CWE-416: Use After Free
    Instancias del GT: CVE-2023-43615 (mbedTLS — TLS 1.3 session)
    ======================================================================
  -->
  <checker name="USE_AFTER_FREE"         enabled="true"
           comment="Uso de puntero después de haber liberado la memoria apuntada"/>
  <checker name="RESOURCE_LEAK"          enabled="true"
           comment="Fuga de recursos — memoria no liberada en todas las rutas"/>
  <checker name="DOUBLE_FREE"            enabled="true"
           comment="Liberación doble de un mismo bloque de memoria"/>
  <checker name="USE_AFTER_RETURN"       enabled="true"
           comment="Uso de puntero a variable local tras retorno de función"/>

  <!--
    ======================================================================
    Configuración global del análisis
    ======================================================================
  -->

  <!-- Nivel de interprocedural analysis: máximo para C criptográfico -->
  <option name="--enable-fnptr"    value="true"
          comment="Seguir punteros a función — crítico en callbacks TLS"/>
  <option name="--enable-virtual"  value="false"
          comment="Dispatch virtual — no aplica en C puro (mbedTLS/wolfSSL)"/>
  <option name="--concurrency"     value="false"
          comment="Data race detection — reservado para Contiki-NG (TSan)"/>

  <!-- Profundidad de análisis interprocedural -->
  <option name="--max-function-size"     value="500"
          comment="Máximo de líneas por función para análisis completo"/>
  <option name="--max-paths"             value="10000"
          comment="Límite de rutas de ejecución por función"/>

  <!--
    CHECKERS EXPLÍCITAMENTE DESACTIVADOS para el benchmark:
    Reducen el ruido y mantienen la comparación con CodeQL controlada.
    Se pueden activar en la fase CAP-02 (integración en pipeline completo).
  -->
  <checker name="MISRA_C_2012"           enabled="false"
           comment="Conformidad MISRA — fuera del scope del benchmark SAST"/>
  <checker name="CERT_C"                 enabled="false"
           comment="Conformidad CERT-C — fuera del scope del benchmark SAST"/>
  <checker name="DEADCODE"               enabled="false"
           comment="Código muerto — no es una vulnerabilidad de seguridad"/>
  <checker name="UNINIT"                 enabled="false"
           comment="Variable no inicializada — alto FP rate en macros criptográficas"/>

</checker-configuration>
