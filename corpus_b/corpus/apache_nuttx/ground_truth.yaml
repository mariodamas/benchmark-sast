  - id: NUTTX-DEFECT-003
    source: shen_et_al_issta_2025
    confirmed_by: pr_merged
    pr_url: https://github.com/apache/nuttx/pull/15448
    cwe_id: CWE-190
    cwe_family: integer-overflow
    codeql_query: cpp/uncontrolled-allocation-size
    severity: error
    affected_file: drivers/sensors/gnss_uorb.c
    affected_function: gnss_activate
    affected_line_approx: 168
    commit_fix: 350f396aa50463f762d1f8df62ef3799a96cac0e
    commit_vulnerable: 7e0e4dea755939aef750d83c7c3f31f898dc7d7f
    commit_verified: false
    structural_fn: false
    needs_manual_verification: false
    notes: >
      Integer overflow in crefs counter (uint8_t, max 255). Fix adds boundary
      check before increment/decrement operations. The overflow could cause
      incorrect reference counting in sensor activation logic.
      Confirmed in Shen et al. ISSTA 2025. PR merged by Apache NuttX maintainers.

  - id: NUTTX-DEFECT-004
    source: shen_et_al_issta_2025
    confirmed_by: pr_merged
    pr_url: https://github.com/apache/nuttx/pull/15008
    cwe_id: CWE-190
    cwe_family: integer-overflow
    codeql_query: cpp/uncontrolled-allocation-size
    severity: error
    affected_file: drivers/video/fb.c
    affected_function: fb_register_device
    affected_line_approx: 1732
    commit_fix: 257339a442c1d346b690b3feb8e96562d8405dd0
    commit_vulnerable: a0420df332ae392efac9a479647f59074b8af9d6
    commit_verified: false
    structural_fn: false
    needs_manual_verification: false
    notes: >
      Variable declared as size_t (unsigned) caused integer overflow in
      indexing/comparison. Fix changes declaration to ssize_t (signed) to
      prevent overflow at boundary values in framebuffer device registration.
      Confirmed in Shen et al. ISSTA 2025. PR merged by Apache NuttX maintainers.

  # ---------------------------------------------------------------------------
  # FAMILIA: buffer-overflow (1 instancia)
  # CWE-120 — cpp/unbounded-write
  # ---------------------------------------------------------------------------

  - id: NUTTX-DEFECT-005
    source: shen_et_al_issta_2025
    confirmed_by: pr_merged
    pr_url: https://github.com/apache/nuttx/pull/18462
    cwe_id: CWE-120
    cwe_family: buffer-overflow
    codeql_query: cpp/unbounded-write
    severity: error
    affected_file: arch/xtensa/src/esp32/esp32_spi.c
    affected_function: esp32_spi_poll_exchange
    affected_line_approx: 1104
    commit_fix: 6cb6c45987253862035641896f87ad0ef52bd929
    commit_vulnerable: 3582497909a515cdc8222e7872492ab44caead6a
    commit_verified: false
    structural_fn: false
    needs_manual_verification: false
    notes: >
      SPI poll exchange computed a chunk size from (transfer_size - i) without
      bounding it to sizeof(uint32_t), causing potential over-read/write into
      the SPI FIFO buffer. Fix adds explicit bounds check before buffer access.
      Confirmed in Shen et al. ISSTA 2025. PR merged by Apache NuttX maintainers.
