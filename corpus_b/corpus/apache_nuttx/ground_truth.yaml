  # ---------------------------------------------------------------------------
  # FAMILIA: null-deref (2 instancias)
  # CWE-476 — cpp/inconsistent-null-check
  # ---------------------------------------------------------------------------

  - id: NUTTX-DEFECT-001
    source: shen_et_al_issta_2025
    confirmed_by: pr_merged
    pr_url: https://github.com/apache/nuttx/pull/18197
    cwe_id: CWE-476
    cwe_family: null-deref
    codeql_query: cpp/inconsistent-null-check
    severity: error
    affected_file: sched/sched/sched_mergepending.c
    affected_function: nxsched_merge_pending
    affected_line_approx: 96
    commit_fix: e2aec529cb2382f57b13962fd6c0a51c20648e22
    commit_vulnerable: 7f167ecc856cfa50bb81a4fcaa411377fac06313
    commit_verified: false
    structural_fn: false
    needs_manual_verification: false
    notes: >
      rtcb returned by nxsched_remove_readytorun() was used in a loop condition
      (rtcb->sched_priority) without a preceding NULL guard. Fix adds
      "rtcb &&" check before the field dereference.
      Confirmed in Shen et al. ISSTA 2025. PR merged by Apache NuttX maintainers.

  - id: NUTTX-DEFECT-002
    source: shen_et_al_issta_2025
    confirmed_by: pr_merged
    pr_url: https://github.com/apache/nuttx/pull/17958
    cwe_id: CWE-476
    cwe_family: null-deref
    codeql_query: cpp/inconsistent-null-check
    severity: error
    affected_file: sched/irq/irq_attach_thread.c
    affected_function: irq_default_handler
    affected_line_approx: 72
    commit_fix: e143acfc4642e53b5998f2b2dc617be4c0a48c4f
    commit_vulnerable: 0e5323370f5faad2b2eba5293e139d574bfac9c7
    commit_verified: false
    structural_fn: false
    needs_manual_verification: false
    notes: >
      info->handler function pointer called without checking if it was NULL.
      Two files patched in the same PR: irq_attach_thread.c and irq_attach_wqueue.c.
      Fix adds NULL guard before calling the handler.
      Confirmed in Shen et al. ISSTA 2025. PR merged by Apache NuttX maintainers.

