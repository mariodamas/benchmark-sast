  - id: MBEDOS-DEFECT-004
    source: shen_et_al_issta_2025
    confirmed_by: pr_merged
    pr_url: https://github.com/ARMmbed/mbed-os/pull/15177
    cwe_id: CWE-190
    cwe_family: integer-overflow
    codeql_query: cpp/uncontrolled-allocation-size
    severity: error
    affected_file: connectivity/lorawan/include/lorawan/LoRaRadio.h
    affected_function: (struct field — rssi_value)
    affected_line_approx: 200
    commit_fix: f609a5234e91cd450021cd52cf0f6aa881fbfedc
    commit_vulnerable: c08be76aa97e58952479f1553b66223a72dd30f0
    commit_verified: false
    structural_fn: false
    needs_manual_verification: false
    notes: >
      rssi_value struct field declared as int8_t (range -128..127); RSSI values
      below -128 dBm (possible in low-signal scenarios) overflow. Changed to
      int16_t to accommodate the full RSSI dynamic range without overflow.
      Confirmed in Shen et al. ISSTA 2025. PR merged by ARM Mbed maintainers.
      commit_vulnerable is the first parent of the merge commit (main before PR was merged).
