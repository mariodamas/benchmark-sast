    affected_file: src/rcore.c
    affected_function: TextFormat
    affected_line_approx: 4313
    commit_fix: 944567651ca7e3f43ff758a1326da481bc9d07a7
    commit_vulnerable: 1bbc8682f47b996b363d40f5692dc73765145f4f
    commit_verified: false
    structural_fn: false
    needs_manual_verification: false
    notes: >
      sprintf(truncBuffer, "...") writing to a 4-byte buffer with no size limit.
      Replaced with snprintf(truncBuffer, 4, "..."). Two files affected in same PR
      (rcore.c, rtext.c); primary defect in TextFormat in rcore.c.
      Confirmed in Shen et al. ISSTA 2025. PR merged by raylib maintainers.

